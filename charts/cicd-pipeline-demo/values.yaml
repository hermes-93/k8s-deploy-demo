# Default values for cicd-pipeline-demo.
# Override per environment with values-dev.yaml / values-staging.yaml / values-prod.yaml

replicaCount: 1

image:
  repository: ghcr.io/hermes-93/cicd-pipeline-demo
  pullPolicy: IfNotPresent
  tag: "1.0.1"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: cicd-pipeline-demo.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# Liveness probe — fast, checks the process is alive
livenessProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

# Readiness probe — full health check before receiving traffic
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# App environment variables (passed as ConfigMap)
env:
  APP_ENV: production
  LOG_LEVEL: INFO
  SERVICE_NAME: cicd-pipeline-demo
  SERVICE_VERSION: "1.0.1"

nodeSelector: {}
tolerations: []
affinity: {}
